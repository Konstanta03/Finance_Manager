name: FinanceManager CI/CD

on:
  push:
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      DOTNET_VERSION: '8.0.x'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore FinanceManager2.0.sln

      - name: Build
        run: dotnet build FinanceManager2.0.sln --configuration Release --no-restore

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: build
    env:
      DOTNET_VERSION: '8.0.x'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore FinanceManager2.0.sln

      - name: Run tests
        run: dotnet test FinanceManager2.0.sln --configuration Release --no-restore --verbosity normal --collect:"XPlat Code Coverage"

  publish:
    name: Publish artifact
    runs-on: ubuntu-latest
    needs: test
    env:
      DOTNET_VERSION: '8.0.x'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore FinanceManager2.0.sln

      - name: Publish
        run: dotnet publish FinanceManager2.0.csproj --configuration Release --no-restore --output ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: finance-manager-app
          path: ./publish

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: publish
    if: ${{ github.event_name == 'push' }}
    env:
      AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
      AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: finance-manager-app
          path: ./publish

      - name: Skip deploy when Azure secrets are missing
        if: ${{ env.AZURE_WEBAPP_NAME == '' || env.AZURE_WEBAPP_PUBLISH_PROFILE == '' }}
        run: echo "Azure secrets are not configured, so deployment is skipped. Build and tests still passed."

      - name: Deploy to Azure Web App
        if: ${{ env.AZURE_WEBAPP_NAME != '' && env.AZURE_WEBAPP_PUBLISH_PROFILE != '' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
